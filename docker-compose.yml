version: '3.8'

services:

  # PostgreSQL + TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: bankflow_postgres
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       bankflow_dwh
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./warehouse/schemas:/docker-entrypoint-initdb.d
    networks:
      - bankflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bankflow_dwh"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Airflow metadata database
  airflow-postgres:
    image: postgres:15
    container_name: bankflow_airflow_postgres
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - bankflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Airflow init (runs once)
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: bankflow_airflow_init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR:             LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES:        'false'
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init && \
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@bankflow.local
    networks:
      - bankflow_network

  # Airflow webserver
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: bankflow_airflow_webserver
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR:             LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES:        'false'
    ports:
      - "9085:8080"
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./logs/airflow:/opt/airflow/logs
      - .:/opt/airflow/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow webserver
    networks:
      - bankflow_network

  # Airflow scheduler
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: bankflow_airflow_scheduler
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR:             LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES:        'false'
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./logs/airflow:/opt/airflow/logs
      - .:/opt/airflow/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler
    networks:
      - bankflow_network

  # Spark Master
  spark-master:
    image: apache/spark:3.5.3
    container_name: bankflow_spark_master
    environment:
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "9082:8080"
      - "7077:7077"
    volumes:
      - .:/opt/spark/project
      - ./data:/opt/spark/data
    networks:
      - bankflow_network

  # Spark Worker
  spark-worker:
    image: apache/spark:3.5.3
    container_name: bankflow_spark_worker
    environment:
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    ports:
      - "9081:8081"
    volumes:
      - .:/opt/spark/project
      - ./data:/opt/spark/data
    networks:
      - bankflow_network

networks:
  bankflow_network:
    driver: bridge

volumes:
  postgres_data:
  airflow_postgres_data: